{{ partial "header.html" . }}
<span id="sidebar-toggle-span">
<a href="#" id="sidebar-toggle" data-sidebar-toggle=""><i class="fas fa-bars"></i> navigation</a>
</span>

<div class="pi4j-home pi4j-overview">
  {{ with .Content }}<div class="pi4j-overview__intro">{{ . }}</div>{{ end }}

  <div class="pi4j-cards">
    {{ range (where .Site.RegularPages "Section" "video").ByDate.Reverse }}
    <a class="pi4j-card" href="{{ .RelPermalink }}">
      <div class="pi4j-card__thumb"{{ with .Params.youtube }} style="background-image:url('https://img.youtube.com/vi/{{ . }}/hqdefault.jpg')"{{ end }}>
        <span class="pi4j-card__play"><i class="fab fa-youtube"></i></span>
      </div>
      <div class="pi4j-card__body">
        <span class="pi4j-card__date">{{ .Date.Format "2 Jan 2006" }}</span>
        <span class="pi4j-card__title">{{ .Title }}</span>
      </div>
    </a>
    {{ end }}
  </div>
</div>
{{ partial "footer.html" . }}
